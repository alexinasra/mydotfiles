# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Vintage Legacy, Japan Version, NinjaSushi, DS-Digital, Monospace


general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

auth {
    pam:module = hyprlock
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = ~/.config/hypr/lockscreen.png
    blur_passes = 0 
}

input-field {
    monitor = eDP-1
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format =  
    # dots_size = 0.5
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 120
    halign = center
    valign = bottom
}

# TIME
label {
    monitor =
    text = $TIME12 # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:100] playerctl -p firefox status >/dev/null 2>&1 && \
            echo "<span><b>$(playerctl -p firefox status) : </b><span>$(playerctl -p firefox metadata title)</span></span>"
    font_size = 16
    font_family = $font
    text_align = left
    position = 30, -30
    halign = left
    valign = top
    onclick = playerctl -p firefox play-pause
}
label {
    monitor =
    text = cmd[update:100] playerctl -p io.github.celluloid_player.Celluloid  status >/dev/null 2>&1 && \
            echo "<span><b>$(playerctl -p io.github.celluloid_player.Celluloid status) : </b><span>$(playerctl -p io.github.celluloid_player.Celluloid metadata  xesam:url)</span></span>"
    font_size = 16
    font_family = $font
    text_align = left
    position = 30, -90
    halign = left
    valign = top
    onclick = playerctl -p io.github.celluloid_player.Celluloid play-pause
}

label {
    monitor =
    text = $LAYOUT
    font_size = 24
    onclick = hyprctl switchxkblayout all next

    font_family = $font
    position = 350, 120
    halign = center
    valign = bottom
}
